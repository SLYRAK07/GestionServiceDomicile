<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e7b0"/>
      <stop offset="50%" stop-color="#d4a437"/>
      <stop offset="100%" stop-color="#fff2c7"/>
    </linearGradient>
  </defs>

  <!-- Cercle -->
  <circle cx="110" cy="100" r="70"
          fill="none"
          stroke="url(#goldGradient)"
          stroke-width="8"/>

  <!-- Maison -->
  <path d="M70 105 L110 65 L150 105"
        fill="none"
        stroke="url(#goldGradient)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <rect x="82" y="105" width="56" height="45"
        rx="6"
        fill="none"
        stroke="url(#goldGradient)"
        stroke-width="8"/>

  <!-- Lettre S -->
  <text x="110" y="133"
        text-anchor="middle"
        font-size="55"
        font-family="Poppins, Arial, sans-serif"
        fill="url(#goldGradient)"
        font-weight="bold">
    S
  </text>

  <!-- Texte -->
  <text x="210" y="118"
        font-size="52"
        font-family="Poppins, Arial, sans-serif"
        fill="url(#goldGradient)"
        font-weight="600">
    ServiHome
  </text>

  <!-- Ligne déco -->
  <line x1="212" y1="138" x2="470" y2="138"
        stroke="url(#goldGradient)"
        stroke-width="3"
        stroke-linecap="round"/>
</svg>