services:
  - type: web
    name: servihome-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn service_adomicile.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: servihome_db
          property: connectionString

databases:
  - name: servihome_db
    plan: free